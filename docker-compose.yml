services:
  backend:
    build: .
    container_name: crab_backend
    environment:
      APP_ENV: local
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://crab:crab@postgres:5432/crab_farm
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: crab-farm-backend
      CORS_ORIGINS: '["http://localhost:5173"]'
      STORAGE_DIR: storage
      PUBLIC_STORAGE_URL: /storage
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: crab_postgres
    environment:
      POSTGRES_DB: crab_farm
      POSTGRES_USER: crab
      POSTGRES_PASSWORD: crab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crab -d crab_farm"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: crab_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
